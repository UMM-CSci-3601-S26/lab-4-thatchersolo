<div class="flex-row">
  <div class="flex-1">

    <!-- Search Field -->
    <mat-card class="search-card">
      <mat-card-header>
        <mat-card-title class="family-list-title">Families</mat-card-title>
      </mat-card-header>
      <mat-card-content>

      </mat-card-content>
    </mat-card>
  </div>
</div>

<div class="flex-row">
  @if (families()) {
  <div class="flex-1">
      <div class="family-cards-container flex-row gap-8 flex-wrap">
        @for (family of families(); track family._id) {
        <app-family-card class="family-card" [family]="family"></app-family-card>
        }
      </div>
    </div>
}  @else {
  <div class="flex-1 family-error">
    <mat-error>
      There was a problem loading the families. Possibly the server is down or perhaps there are network
      issues.
    </mat-error>
    <mat-error>
      Please wait a bit and try again or start the server.
    </mat-error>
  </div>
  }
</div>


<button mat-raised-button (click)="downloadCSV()">
  Export CSV
</button>

<button mat-fab class="add-family-fab" matTooltip="Add Family" matTooltipPosition="left" routerLink="/family/new"
  data-test="addFamilyButton">
  <mat-icon class="md-24" aria-label="Add Family">add</mat-icon>
</button>
